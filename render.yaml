services:
  - type: web
    name: projectinventory-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: REDIRECT_URI
        sync: false
      - key: DATABASE_URI
        value: sqlite:////var/data/inventory.db

    # Persistent disk keeps the SQLite file across deploys.
    # Add this in the Render dashboard under your service → Disks,
    # or uncomment below (requires a paid Render plan).
    # disk:
    #   name: inventory-data
    #   mountPath: /var/data
    #   sizeGB: 1
